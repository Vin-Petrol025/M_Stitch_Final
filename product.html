    <script src="products.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const productId = parseInt(params.get("id"));
      const product = products.find((p) => p.id === productId);
      const detailDiv = document.getElementById("product-detail");
      if (product) {
        const isVideo = (url) => /\.(mp4|webm|ogg|mov|m4v)(\?.*)?$/i.test(url);
        const createThumbnail = (src, idx) => {
          if (isVideo(src)) {
            return `
              <video src="${src}" class="thumbnail thumbnail-video${
                idx === 0 ? " selected" : ""
              }" data-idx="${idx}" muted playsinline loop preload="metadata"></video>
            `;
          }
          return `
              <img src="${src}" class="thumbnail${
                idx === 0 ? " selected" : ""
              }" data-idx="${idx}" alt="${product.name} thumbnail ${idx + 1}" />
            `;
        };
        const createMainMedia = (src, name) => {
          if (isVideo(src)) {
            return `
              <video src="${src}" class="main-media fade-in" controls autoplay muted playsinline></video>
            `;
          }
          return `
              <img src="${src}" class="main-media fade-in" alt="${name}" />
            `;
        };

        let thumbnails = product.images
          .map((img, idx) => createThumbnail(img, idx))
          .join("");
        detailDiv.innerHTML = `
          <div class="product-gallery">
            <div class="main-image-container">
              ${createMainMedia(product.images[0], product.name)}
            </div>
            <div class="thumbnails">
              ${thumbnails}
            </div>
            <div class="product-info">
              <h2>${product.name}</h2>
              <p class="price">
                ${product.originalPrice ? `<span class="original-price">${product.originalPrice}</span>` : ""}
                <span class="discounted-price">${product.price}</span>
              </p>
              <p class="product-description">${product.description}</p>
              ${
                product.inStock === 1
                  ? `<a href="buy.html?id=${product.id}" class="buy-now-btn">Buy Now</a>`
                  : ""
              }
              <p class="info-dm" >
                For more info, Detailed video and more details about this article, DM us at <a href="https://instagram.com/belle.tasche.pk" target="_blank" style="color:hsl(160, 50%, 50%);text-decoration:underline;">M Stitch</a>.
              </p>
              <a href="index.html" class="back-link">&larr; Back to Shop</a>
            </div>
          </div>
        `;
        const mediaContainer = detailDiv.querySelector(".main-image-container");
        const thumbs = detailDiv.querySelectorAll(".thumbnail");
        thumbs.forEach((thumb, idx) => {
          thumb.addEventListener("click", function () {
            if (!thumb.classList.contains("selected")) {
              detailDiv
                .querySelector(".thumbnail.selected")
                .classList.remove("selected");
              thumb.classList.add("selected");
              mediaContainer.innerHTML = createMainMedia(product.images[idx], product.name);
              const mainMedia = mediaContainer.querySelector(".main-media");
              mainMedia.classList.remove("fade-in");
              void mainMedia.offsetWidth;
              mainMedia.classList.add("fade-in");
            }
          });
        });
      } else {
        detailDiv.innerHTML = "<p>Product not found.</p>";
      }

      if (product) {
        fbq("track", "ViewContent", {
          content_ids: [product.id.toString()],
          content_type: "product",
          value: parseFloat(product.price.replace(/[^0-9.]/g, "")), // extract number
          currency: "PKR",
        });
      }
      document.addEventListener("click", function (e) {
        if (e.target.classList.contains("buy-now-btn")) {
          fbq("track", "InitiateCheckout", {
            content_ids: [product.id.toString()],
            content_type: "product",
            value: parseFloat(product.price.replace(/[^0-9.]/g, "")),
            currency: "PKR",
          });
        }
      });
    </script>
  </body>
