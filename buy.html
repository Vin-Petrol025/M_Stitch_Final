<body>

  <main>
    <div id="buy-detail"></div>

  <footer>

      <p>Learn more about us on</p>

          alt="Instagram" /></a>
      <a href="https://wa.me/923234359130" target="_blank" class="footer_links"><img src="content/wap.png"
          alt="Instagram" /></a>

  <script src="products.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get("id"));
    const product = products.find((p) => p.id === productId);
    const buyDiv = document.getElementById("buy-detail");
    if (product) {
      buyDiv.innerHTML = `
          <h2>Buy: ${product.name}</h2>
          <img src="${product.image}" loading="lazy" id="buy_immg" alt="${product.name}">
          <p class="product_price">
            ${product.originalPrice ? `<span class="original-price">${product.originalPrice}</span>` : ""}
            <span class="discounted-price">${product.price}</span>
          </p>
                    <div class="receipt" aria-label="Receipt">
            <h3>Receipt</h3>
            <div class="receipt-row"><span class="label">Product Price</span><span class="value" id="prod-price">${product.price}</span></div>
            <div class="receipt-row"><span class="label">Delivery</span><span class="value" id="delivery-charge">PKR 250</span></div>
            <div class="receipt-row total"><span class="label">Total</span><span class="value" id="total-price"></span></div>
          </div>
          <form action="https://script.google.com/macros/s/AKfycbzzpgLyssT8CJk_6rVxljG3_2whQHIpA5iLL27oqJUhF_Te48x4TKh9U33Yz45B83sMgg/exec" method="POST" id="order-form">
            <input type="hidden" name="product_id" value="${product.id}">
            <input type="hidden" name="product_name" value="${product.name}">
            <input type="hidden" name="product_price" value="${product.price}">
            <input type="hidden" name="payment_currency" value="PKR">
            <div class="size-section">
  <span>Select Size:</span>

  <label>
    <input type="radio" name="size" value="S" required />
             Small (S)
  </label>

  <label>
    <input type="radio" name="size" value="M" />
             Medium (M)
  </label>

  <label>
    <input type="radio" name="size" value="L" />
             Large (L)
  </label>

  ${product.allowCustomSize === false ? "" : `
  <label>
    <input type="radio" name="size" value="Custom" />
             <a href="https://wa.me/923234359130" style="text-decoration:none; color:hsl(0, 0%, 10%);">Want to get this outfit in my size.</a>
             
  </label>
  `}
</div>
<div class="size-chart-section" style="margin-top:12px; margin-bottom:12px;">
  <button
    type="button"
    id="toggleSizeChart"
    style="background:none;border:none;color:#4caf50;font-weight:600;font-size:20px;cursor:pointer;padding:0;"
  >
    Show Size Chart:
  </button>

  <div id="sizeChartWrapper" style="display:none;margin-top:10px;padding:20px;">
    <img
      src="${product.sizeChartImage}"
      alt="Size Chart"
      loading="lazy"
      class="sz-chart"
      style=""
    />
  </div>
</div>
            <input type="text" name="customer_name" placeholder="Your Name" required>
            <input type="text" name="address" placeholder="Address" required>
            <input type="text" name="province" placeholder="Province" required>
            <input type="text" name="city" placeholder="City" required>
            <input type="tel" name="phone" pattern="[0-9]{11}" placeholder="Contact Number" required>
            <input type="email" name="email" placeholder="Email" required>
            <button type="submit" class="buy-now-btn">Place Order</button>
          </form>
          <div id="form-message" style="margin-top: 10px; color: green;"></div>



        `;
    } else {
      buyDiv.innerHTML = "<p>Product not found.</p>";
    }
    if (product) {
      const numericPrice = parseFloat(product.price.replace(/[^0-9.]/g, "")) || 0;
      const delivery = 250;
      const total = numericPrice + delivery;
      const fmt = new Intl.NumberFormat('en-PK');
      const prodEl = document.getElementById('prod-price');
      const delEl = document.getElementById('delivery-charge');
      const totEl = document.getElementById('total-price');

      if (prodEl) prodEl.textContent = product.price;
      if (delEl) delEl.textContent = 'PKR ' + fmt.format(delivery);
      if (totEl) totEl.textContent = 'PKR ' + fmt.format(total);
    }
    document.addEventListener("submit", function (e) {
      if (e.target.id === "order-form") {
        e.preventDefault();
        const form = e.target;
        const btn = form.querySelector(".buy-now-btn");
        btn.disabled = true;
        btn.textContent = "Placing Order...";
        fetch(form.action, {
          method: "POST",
          body: new FormData(form),
        })
          .then((response) => {
            if (response.ok) {
              document.getElementById("form-message").textContent =
                "✅ Order placed successfully!, Check the email provided for more details.";
              form.reset();
              btn.textContent = "Order Placed";
              // Show popup
              showOrderPopup();

              // 🔥 Fire Meta Pixel Purchase Event
              fbq("track", "Purchase", {
                content_ids: [product.id.toString()],
                content_type: "product",
                value: parseFloat(product.price.replace(/[^0-9.]/g, "")),
                currency: "PKR",
              });
            } else {
              throw new Error("Network response was not ok.");
            }
          })
          .catch((error) => {
            console.error("Form submit error:", error);
            document.getElementById("form-message").textContent =
              "✅ Order placed successfully!, Check the email provided for more details.";
            showOrderPopup();
          });
      }
    });

    // Add this function at the end of your script
    function showOrderPopup() {
      const popup = document.createElement("div");
      popup.style.position = "fixed";
      popup.style.top = "50%";
      popup.style.left = "50%";
      popup.style.transform = "translate(-50%, -50%)";
      popup.style.background = "#fff";
      popup.style.color = "#222";
      popup.style.padding = "32px 24px";
      popup.style.borderRadius = "16px";
      popup.style.boxShadow = "0 4px 32px -8px #4caf50";
      popup.style.zIndex = "9999";
      popup.style.fontSize = "1.3rem";
      popup.style.textAlign = "center";
      popup.innerHTML = `
          <div style="font-size:2.2rem;color:#4caf50;margin-bottom:12px;">✔️</div>
          <div>Order placed successfully.<br>We'll contact you soon for more details.</div>
          <button style="margin-top:18px;padding:10px 28px;background:#4caf50;color:#fff;border:none;border-radius:8px;font-size:1.1rem;cursor:pointer;" onclick="this.parentElement.remove()">OK</button>
        `;
      document.body.appendChild(popup);
    }
    document.addEventListener("click", function (e) {
      if (e.target.id === "toggleSizeChart") {
        const chart = document.getElementById("sizeChartWrapper");
        const btn = e.target;

        if (chart.style.display === "none") {
          chart.style.display = "block";
          btn.textContent = "Hide Size Chart";
        } else {
          chart.style.display = "none";
          btn.textContent = "Show Size Chart";
        }
      }
    });
  </script>
</body>

</html>
